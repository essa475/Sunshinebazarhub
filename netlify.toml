########################################################################
# Netlify config for the Sunshine storefront (frontend only)
#
# This deploys the React/Vite storefront as a static site.
# Auth and orders are localStorage-based — no backend required.
# Products come from a bundled static catalog.
########################################################################

[build]
  base = "."
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/sunshine run build"
  publish = "artifacts/sunshine/dist/public"

[build.environment]
  NODE_VERSION = "20"
  # BASE_PATH must be "/" for Netlify (root deployment, no sub-path)
  BASE_PATH = "/"

# Single-page app: let client-side routing (wouter) handle all paths.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
